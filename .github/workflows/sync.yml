name: Daily Garmin Sync

on:
  schedule:
    # 11:00 UTC = 6:00 AM Central Time
    - cron: '0 11 * * *'
  workflow_dispatch:   # lets you trigger manually from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync last 2 days from Garmin
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
        run: python sync_garmin.py --days 2

      - name: Rebuild index.html with fresh data
        run: python rebuild.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin/data.json index.html garmin/daily/ garmin/activities/ || true
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "Garmin sync $(date -u '+%Y-%m-%d')" && git push
