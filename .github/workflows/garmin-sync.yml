name: Garmin Sync

on:
  schedule:
    - cron: '0 11 * * *'  # 6am Central time (UTC-5)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore token
        run: |
          echo "${{ secrets.GARMIN_TOKEN_B64 }}" | base64 -d > ~/.garmin_tokens

      - name: Sync Garmin data
        run: python sync_garmin.py --days 3 --sink files --out ./garmin

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin/
          git diff --staged --quiet || git commit -m "Garmin sync $(date -u +%Y-%m-%d)"
          git push
