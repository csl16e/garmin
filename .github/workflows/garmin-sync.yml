name: Garmin Sync

on:
  schedule:
    - cron: '0 11 * * *'  # 6am Central time (UTC-5)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore token
        run: |
          echo "${{ secrets.GARMIN_TOKEN_B64 }}" | base64 -d > ~/.garmin_tokens

      - name: Sync Garmin data
        run: python sync_garmin.py --days 3 --sink files --out ./garmin

      - name: Rebuild dashboard with fresh data
        run: |
          python3 - <<'EOF'
          import json, re

          data = json.load(open('garmin/data.json'))
          html = open('index.html').read()

          new_js = 'const GARMIN_DATA = ' + json.dumps(data) + ';'
          # Replace everything between the two sentinel markers
          html = re.sub(
            r'(// DATA_START\n)[\s\S]*?(// DATA_END)',
            r'\g<1>' + new_js + r'\n// DATA_END',
            html, count=1
          )
          if '// DATA_START' not in html:
            # Fallback: replace the const declaration line
            html = re.sub(r'const GARMIN_DATA = [^\n]+;', new_js, html, count=1)

          open('index.html', 'w').write(html)
          print('Dashboard rebuilt with', len(data['activities']), 'activities')
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin/ index.html
          git diff --staged --quiet || git commit -m "Garmin sync $(date -u +%Y-%m-%d)"
          git push
